- function:
    name: tag_entity
    schema: directory
    return_type: integer
    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: entity_id
      data_type: integer
    - name: tag
      data_type: text
    source: |-
      INSERT INTO directory.entity_tag_link(tag_id, entity_id)
          SELECT id, $1
          FROM directory.tag
          LEFT JOIN directory.entity_tag_link ON entity_tag_link.tag_id = tag.id AND entity_tag_link.entity_id = $1
          WHERE name = $2 AND entity_tag_link.entity_id IS NULL;

          SELECT $1;
- function:
    name: update_denormalized_entity_tags
    schema: directory
    return_type: directory.entity_tag_link_denorm
    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: entity_id
      data_type: integer
    source: |-
      DELETE FROM directory.entity_tag_link_denorm WHERE entity_id = $1;
      INSERT INTO directory.entity_tag_link_denorm
      SELECT
          entity.id,
          array_agg(lower(tag.name)),
          lower(entity.name)
      FROM directory.entity
      JOIN directory.entity_tag_link etl ON etl.entity_id = entity.id
      JOIN directory.tag ON tag.id = etl.tag_id
      WHERE entity.id = $1
      GROUP BY (entity.id, entity.name)
      RETURNING *;
- function:
    name: create_entity_type_tag
    schema: directory
    return_type: trigger
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      BEGIN
          BEGIN
              INSERT INTO directory.tag (name, tag_group_id) SELECT NEW.name, id FROM directory.tag_group WHERE directory.tag_group.name = 'entity_type';
          EXCEPTION WHEN unique_violation THEN
              UPDATE directory.tag SET tag_group_id = (SELECT id FROM directory.tag_group WHERE directory.tag_group.name = 'entity_type') WHERE tag.name = NEW.name;
          END;

          RETURN NEW;
      END;
- function:
    name: create_entity_table
    schema: entity
    return_type: trigger
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      BEGIN
          INSERT INTO directory.tag (name, tag_group_id) SELECT NEW.name, id FROM directory.tag_group WHERE directory.tag_group.name = 'entity_type';
          EXECUTE format(
              'CREATE TABLE entity.%I PARTITION OF directory.entity FOR VALUES IN ( %s );',
              NEW.name,
              NEW.id
         );
         EXECUTE format(
             'CREATE INDEX "ix_directory_entity_%s_name" ON entity.%I (name);',
             NEW.name,
             NEW.name
         );
         EXECUTE format(
             'GRANT SELECT ON TABLE entity.%I TO minerva;',
             NEW.name
         );
         EXECUTE format(
             'GRANT INSERT,UPDATE,DELETE ON TABLE entity.%I TO minerva_writer;',
             NEW.name
         );
         EXECUTE format(
             'CREATE TRIGGER "create_entity_tag_link_for_new_%s_entity"'
             '  AFTER INSERT ON entity.%I'
             '  FOR EACH ROW'
             '  EXECUTE PROCEDURE directory.create_entity_tag_link();',
             NEW.name,
             NEW.name
         );
         RETURN NEW;
      END;
- function:
    name: create_entity_tag_link
    schema: directory
    return_type: trigger
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      BEGIN
          INSERT INTO directory.entity_tag_link (entity_id, tag_id) VALUES (NEW.id, (
          SELECT tag.id FROM directory.tag
          INNER JOIN directory.entity_type ON tag.name = entity_type.name
          WHERE entity_type.id = NEW.entity_type_id
          ));

          RETURN NEW;
      END;
- function:
