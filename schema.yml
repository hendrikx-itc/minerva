- function:
    name: transfer_to_staging
    schema: entity_tag
    return_type: bigint
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: name
      data_type: name
    source: |-
      DECLARE
          insert_count bigint;
      BEGIN
          EXECUTE format('INSERT INTO entity_tag.entity_tag_link_staging(entity_id, tag_name, tag_group_id)
      SELECT entity_id, tag, tag_group_id FROM entity_tag.%I, entity_tag.type WHERE type.name = $1', name)
          USING name;

          GET DIAGNOSTICS insert_count = ROW_COUNT;

          RETURN insert_count;
      END;
- view:
    name: _new_tags_in_staging
    schema: entity_tag
    query: |2-
       SELECT staging.tag_name AS name,
          staging.tag_group_id
         FROM (entity_tag.entity_tag_link_staging staging
           LEFT JOIN directory.tag ON ((lower((tag.name)::text) = lower(staging.tag_name))))
        WHERE (tag.name IS NULL)
        GROUP BY staging.tag_name, staging.tag_group_id;
    privileges:
    - role: minerva
      privilege: SELECT
- function:
    name: add_new_tags
    schema: entity_tag
    return_type: bigint
    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      WITH t AS (
              INSERT INTO directory.tag(name, tag_group_id, description)
              SELECT name, tag_group_id, 'created by entity_tag.update'
              FROM entity_tag._new_tags_in_staging
              RETURNING *
          )
          SELECT count(*) FROM t;
- view:
    name: _new_links_in_staging
    schema: entity_tag
    query: |2-
       SELECT staging.entity_id,
          tag.id AS tag_id
         FROM ((entity_tag.entity_tag_link_staging staging
           JOIN directory.tag ON ((lower((tag.name)::text) = lower(staging.tag_name))))
           LEFT JOIN directory.entity_tag_link etl ON (((etl.entity_id = staging.entity_id) AND (etl.tag_id = tag.id))))
        WHERE (etl.entity_id IS NULL);
    privileges:
    - role: minerva
      privilege: SELECT
- function:
    name: add_new_links
    schema: entity_tag
    return_type: bigint
    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: add_limit
      data_type: integer
    source: |-
      WITH t AS (
              INSERT INTO directory.entity_tag_link(entity_id, tag_id)
              SELECT entity_id, tag_id
              FROM entity_tag._new_links_in_staging
              LIMIT $1
              RETURNING *
          )
          SELECT count(*) FROM t;
- view:
    name: _obsolete_links
    schema: entity_tag
    query: |2-
       SELECT etl.entity_id,
          etl.tag_id
         FROM ((directory.entity_tag_link etl
           JOIN directory.tag ON ((tag.id = etl.tag_id)))
           LEFT JOIN entity_tag.entity_tag_link_staging staging ON (((staging.tag_name = (tag.name)::text) AND (staging.entity_id = etl.entity_id))))
        WHERE (((tag.name)::text IN ( SELECT entity_tag_link_staging.tag_name
                 FROM entity_tag.entity_tag_link_staging
                GROUP BY entity_tag_link_staging.tag_name)) AND (staging.entity_id IS NULL));
    privileges:
    - role: minerva
      privilege: SELECT
- function:
    name: remove_obsolete_links
    schema: entity_tag
    return_type: bigint
    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      WITH t AS (
              DELETE FROM directory.entity_tag_link
              USING entity_tag._obsolete_links
              WHERE entity_tag_link.entity_id = _obsolete_links.entity_id AND entity_tag_link.tag_id = _obsolete_links.tag_id
              RETURNING *
          )
          SELECT count(*) FROM t;
- composite_type:
    name: process_staged_links_result
    schema: entity_tag
    columns:
    - name: tags_added
      data_type: bigint
      nullable: false
    - name: links_added
      data_type: bigint
      nullable: false
    - name: links_removed
      data_type: bigint
      nullable: false
- function:
    name: process_staged_links
    schema: entity_tag
    return_type: entity_tag.process_staged_links_result
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: process_limit
      data_type: integer
    source: |-
      DECLARE
          result entity_tag.process_staged_links_result;
      BEGIN
          result.tags_added = entity_tag.add_new_tags();
          result.links_added = entity_tag.add_new_links($1);
          result.links_removed = entity_tag.remove_obsolete_links();

          TRUNCATE entity_tag.entity_tag_link_staging;

          RETURN result;
      END;
- composite_type:
    name: update_result
    schema: entity_tag
    columns:
    - name: staged
      data_type: bigint
      nullable: false
    - name: tags_added
      data_type: bigint
      nullable: false
    - name: links_added
      data_type: bigint
      nullable: false
    - name: links_removed
      data_type: bigint
      nullable: false
- function:
    name: update
    schema: entity_tag
    return_type: entity_tag.update_result
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: type_name
      data_type: name
    - name: update_limit
      data_type: integer
      default: '50000'
    source: |-
      DECLARE
          result entity_tag.update_result;
          process_result entity_tag.process_staged_links_result;
      BEGIN
          result.staged = entity_tag.transfer_to_staging(type_name);

          process_result = entity_tag.process_staged_links(update_limit);

          result.tags_added = process_result.tags_added;
          result.links_added = process_result.links_added;
          result.links_removed = process_result.links_removed;

          RETURN result;
      END;
