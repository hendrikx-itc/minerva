- function:
    name: timestamp_to_index
    schema: trend_directory
    return_type: integer
    language: plpgsql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - name: partition_size
      data_type: integer
    - name: timestamp
      data_type: timestamp with time zone
    source: |-
      DECLARE
          unix_timestamp integer;
          div integer;
          modulo integer;
      BEGIN
          unix_timestamp = extract(EPOCH FROM "timestamp")::integer;
          div = unix_timestamp / partition_size;
          modulo = mod(unix_timestamp, partition_size);

          IF modulo > 0 THEN
              return div;
          ELSE
              return div - 1;
          END IF;
      END;
