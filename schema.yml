    source: |-
      SELECT (5,0,0)::system.version_tuple;
- function:
    name: set_version
    schema: system
    return_type: system.version_tuple
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - data_type: system.version_tuple
    source: |-
      BEGIN

          EXECUTE format($sql$CREATE FUNCTION system.version()
          RETURNS system.version_tuple
      AS $function$
      SELECT %s::system.version_tuple;
      $function$ LANGUAGE sql IMMUTABLE;$sql$, $1);

          RETURN $1;

      END;
