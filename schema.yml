- function:
    name: action
    schema: public
    return_type: anyelement
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - data_type: anyelement
    - name: sql
      data_type: text
    source: |-
      BEGIN
          EXECUTE sql;

          RETURN $1;
      END;
- function:
    name: action
    schema: public
    return_type: anyelement
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - data_type: anyelement
    - name: sql
      data_type: text[]
    source: |-
      DECLARE
          statement text;
      BEGIN
          FOREACH statement IN ARRAY sql LOOP
              EXECUTE statement;
          END LOOP;

          RETURN $1;
      END;
- function:
    name: table_exists
    schema: public
    return_type: bool
    language: sql
    volatility: stable
    strict: false
    secdef: false
    arguments:
    - name: schema_name
      data_type: name
    - name: table_name
      data_type: name
    source: |-
      SELECT exists(
              SELECT 1
              FROM pg_class
              JOIN pg_namespace ON pg_class.relnamespace = pg_namespace.oid
              WHERE relname = $2 AND relkind = 'r' AND pg_namespace.nspname = $1
          );
