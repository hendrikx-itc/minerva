- function:
    name: column_names
    schema: public
    return_type: name
    returns_set: true
    language: sql
    volatility: stable
    strict: false
    secdef: false
    arguments:
    - name: namespace
      data_type: name
    - name: table
      data_type: name
    source: |-
      SELECT a.attname
          FROM pg_catalog.pg_class c
          JOIN pg_catalog.pg_namespace n ON c.relnamespace = n.oid
          JOIN pg_catalog.pg_attribute a ON a.attrelid = c.oid
          WHERE
              n.nspname = $1 AND
              c.relname = $2 AND
              a.attisdropped = false AND
              a.attnum > 0;
- function:
    name: fst
    schema: public
    return_type: anyelement
    language: sql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - data_type: anyelement
    - data_type: anyelement
    source: |-
      SELECT $1;
- function:
    name: snd
    schema: public
    return_type: anyelement
    language: sql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - data_type: anyelement
    - data_type: anyelement
    source: |-
      SELECT $2;
- function:
    name: safe_division
    schema: public
    return_type: anyelement
    language: sql
    volatility: immutable
    strict: false
    secdef: false
    arguments:
    - name: numerator
      data_type: anyelement
    - name: denominator
      data_type: anyelement
    source: |-
      SELECT CASE
          WHEN $2 = 0 THEN
              NULL
          ELSE
              $1 / $2
          END;
- function:
    name: add_array
    schema: public
    return_type: anyarray
    language: sql
    volatility: stable
    strict: true
    secdef: false
    arguments:
    - data_type: anyarray
    - data_type: anyarray
    source: |-
      SELECT array_agg((arr1 + arr2)) FROM
      (
          SELECT
              unnest($1[1:least(array_length($1,1), array_length($2,1))]) AS arr1,
              unnest($2[1:least(array_length($1,1), array_length($2,1))]) AS arr2
      ) AS foo;
- aggregate:
    name: sum_array
    schema: public
    sfunc: add_array
    stype: anyarray
    arguments:
    - data_type: anyarray
- function:
    name: divide_array
    schema: public
    return_type: anyarray
    language: sql
    volatility: stable
    strict: true
    secdef: false
    arguments:
    - data_type: anyarray
    - data_type: anyelement
    source: |-
      SELECT array_agg(arr / $2) FROM
      (
          SELECT unnest($1) AS arr
      ) AS foo;
- function:
    name: divide_array
    schema: public
    return_type: anyarray
    language: sql
    volatility: stable
    strict: true
    secdef: false
    arguments:
    - data_type: anyarray
    - data_type: anyarray
    source: |-
      SELECT array_agg(public.safe_division(arr1, arr2)) FROM
      (
          SELECT
          unnest($1[1:least(array_length($1,1), array_length($2,1))]) AS arr1,
          unnest($2[1:least(array_length($1,1), array_length($2,1))]) AS arr2
      ) AS foo;
- function:
    name: array_sum
    schema: public
    return_type: anyelement
    language: sql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - data_type: anyarray
    source: |-
      SELECT sum(t) FROM unnest($1) t;
- function:
    name: to_pdf
    schema: public
    return_type: integer[]
    language: sql
    volatility: stable
    strict: true
    secdef: false
    arguments:
    - data_type: text
    source: |-
      SELECT array_agg(nullif(x, '')::int)
          FROM unnest(string_to_array($1, ',')) AS x;
- function:
