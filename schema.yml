    return_type: text
    language: sql
    volatility: stable
    strict: false
    secdef: false
    arguments:
    - data_type: attribute_directory.attribute_store
    source: |-
      SELECT COALESCE(
              'SELECT md5(' ||
              array_to_string(array_agg(format('COALESCE(($1.%I)::text, '''')', name)), ' || ') ||
              ')',
              'SELECT ''''::text')
          FROM attribute_directory.attribute
          WHERE attribute_store_id = $1.id;
