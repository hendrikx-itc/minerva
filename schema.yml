    - data_type: name
    source: |-
      SELECT
                  i.relname
          FROM
                  pg_class t,
                  pg_class i,
                  pg_index ix,
                  pg_attribute a
          WHERE
                  t.oid = ix.indrelid
                  and i.oid = ix.indexrelid
                  and a.attrelid = t.oid
                  and a.attnum = ANY(ix.indkey)
                  and t.relkind = 'r'
