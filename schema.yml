- function:
    name: changes_on_data_source_update
    schema: trend_directory
    return_type: trigger
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      BEGIN
          IF NEW.name <> OLD.name THEN
              UPDATE trend_directory.partition SET
                  table_name = trend_directory.to_table_name(partition)
              FROM trend_directory.trend_store ts
              WHERE ts.data_source_id = NEW.id AND ts.id = partition.trend_store_id;
          END IF;

          RETURN NEW;
      END;
- function:
    name: cleanup_on_data_source_delete
    schema: trend_directory
    return_type: trigger
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      BEGIN
          DELETE FROM trend_directory.trend_store WHERE data_source_id = OLD.id;

          RETURN OLD;
      END;
- function:
    name: changes_on_trend_update
    schema: trend_directory
    return_type: trigger
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      DECLARE
          base_table_name text;
      BEGIN
          IF NEW.name <> OLD.name THEN
              FOR base_table_name IN
                  SELECT trend_directory.base_table_name(trend_store)
                  FROM trend_directory.trend
                  JOIN trend_directory.trend_store ON trend.trend_store_id = trend_store.id
                  WHERE trend.id = NEW.id
              LOOP
                  EXECUTE format('ALTER TABLE trend_directory.%I RENAME COLUMN %I TO %I', base_table_name, OLD.name, NEW.name);
              END LOOP;
          END IF;

          RETURN NEW;
      END;
- function:
    name: drop_partition_table_on_delete
    schema: trend_directory
    return_type: trigger
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: |-
      DECLARE
          kind CHAR;
      BEGIN
          SELECT INTO kind relkind
          FROM pg_class
          WHERE relname = trend_directory.table_name(OLD);

          IF kind = 'r' THEN
              EXECUTE format(
                  'DROP TABLE IF EXISTS trend_directory.%I CASCADE',
                  trend_directory.table_name(OLD)
              );
          ELSIF kind = 'v' THEN
              EXECUTE format(
                  'DROP VIEW trend_directory.%I',
                  trend_directory.table_name(OLD)
              );
          END IF;

          RETURN OLD;
      END;
