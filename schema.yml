- function:
    name: compact
    schema: attribute_directory
    return_type: attribute_directory.attribute_store
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - data_type: attribute_directory.attribute_store
    description: Remove all subsequent records with duplicate attribute values and
      update the modified of the first
    source: "DECLARE\n    table_name name := attribute_directory.to_table_name($1);\n\
      \    compacted_tmp_table_name name := table_name || '_compacted_tmp';\n    compacted_view_name\
      \ name := attribute_directory.compacted_view_name($1);\n    default_columns\
      \ text[] := ARRAY['entity_id', 'timestamp', '\"end\"', 'hash', 'modified'];\n\
      \    attribute_columns text[];\n    columns_part text;\n    row_count integer;\n\
      BEGIN\n    SELECT array_agg(quote_ident(name)) INTO attribute_columns\n    FROM\
      \ attribute_directory.attribute\n    WHERE attribute_store_id = $1.id;\n\n \
      \   columns_part = array_to_string(default_columns || attribute_columns, ',');\n\
      \n    EXECUTE format(\n        'TRUNCATE attribute_history.%I',\n        compacted_tmp_table_name\n\
      \    );\n\n    EXECUTE format(\n        'INSERT INTO attribute_history.%I(%s)\
      \ '\n        'SELECT %s FROM attribute_history.%I;',\n        compacted_tmp_table_name,\
      \ columns_part,\n        columns_part, compacted_view_name\n    );\n\n    EXECUTE\
      \ format(\n        'UPDATE attribute_history.%I '\n\t'SET modified = now()',\n\
      \tcompacted_tmp_table_name\n    );\n\n    GET DIAGNOSTICS row_count = ROW_COUNT;\n\
      \n    RAISE NOTICE 'compacted % rows', row_count;\n\n    EXECUTE format(\n \
      \       'DELETE FROM attribute_history.%I history '\n        'USING attribute_history.%I\
      \ tmp '\n        'WHERE '\n        '\thistory.entity_id = tmp.entity_id AND\
      \ '\n        '\thistory.timestamp >= tmp.timestamp AND '\n        '\thistory.timestamp\
      \ <= tmp.\"end\";',\n        table_name, compacted_tmp_table_name\n    );\n\n\
      \    columns_part = array_to_string(\n        ARRAY['entity_id', 'timestamp',\
      \ 'modified', 'hash'] || attribute_columns,\n        ','\n    );\n\n    EXECUTE\
      \ format(\n        'INSERT INTO attribute_history.%I(%s) '\n        'SELECT\
      \ %s '\n        'FROM attribute_history.%I',\n        table_name, columns_part,\n\
      \        columns_part,\n        compacted_tmp_table_name\n    );\n\n    PERFORM\
      \ attribute_directory.mark_compacted($1.id);\n\n    RETURN $1;\nEND;"
- function:
    name: materialize_curr_ptr
    schema: attribute_directory
    return_type: integer
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - data_type: attribute_directory.attribute_store
    source: |-
      DECLARE
          table_name name := attribute_directory.curr_ptr_table_name($1);
          view_name name := attribute_directory.curr_ptr_view_name($1);
          row_count integer;
      BEGIN
          IF attribute_directory.requires_compacting($1) THEN
              PERFORM attribute_directory.compact($1);
          END IF;

          EXECUTE format('TRUNCATE attribute_history.%I', table_name);
          EXECUTE format(
              'INSERT INTO attribute_history.%I (entity_id, timestamp) '
              'SELECT entity_id, timestamp '
              'FROM attribute_history.%I', table_name, view_name
          );

          GET DIAGNOSTICS row_count = ROW_COUNT;

          PERFORM attribute_directory.mark_curr_materialized($1.id);

          RETURN row_count;
      END;
- function:
    name: direct_dependers
    schema: attribute_directory
    return_type: name
    returns_set: true
    language: sql
    volatility: stable
    strict: false
    secdef: false
    arguments:
    - name: name
      data_type: text
    source: |-
      SELECT dependee.relname AS name
          FROM pg_depend
          JOIN pg_rewrite ON pg_depend.objid = pg_rewrite.oid
          JOIN pg_class as dependee ON pg_rewrite.ev_class = dependee.oid
          JOIN pg_class as dependent ON pg_depend.refobjid = dependent.oid
          JOIN pg_namespace as n ON dependent.relnamespace = n.oid
          JOIN pg_attribute ON
                  pg_depend.refobjid = pg_attribute.attrelid
                  AND
                  pg_depend.refobjsubid = pg_attribute.attnum
          WHERE pg_attribute.attnum > 0 AND dependent.relname = $1;
- function:
    name: dependers
    schema: attribute_directory
    return_type: record
    returns_set: true
    language: sql
    volatility: stable
    strict: false
    secdef: false
    arguments:
    - name: name
      data_type: name
    - name: level
      data_type: integer
    - name: name
      data_type: name
      mode: t
    - name: level
      data_type: integer
      mode: t
    source: |-
      SELECT (d.dependers).* FROM (
              SELECT attribute_directory.dependers(depender, $2 + 1)
              FROM attribute_directory.direct_dependers($1) depender
          ) d
          UNION ALL
          SELECT depender, $2
          FROM attribute_directory.direct_dependers($1) depender;
