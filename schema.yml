    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - data_type: attribute_directory.attribute_store
    source: |-
      -- Base/parent table
          SELECT attribute_directory.create_base_table($1);

          -- Inherited table definitions
          SELECT attribute_directory.create_history_table($1);
