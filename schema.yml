- function:
    name: populate_modified
    schema: trend_directory
    return_type: trend_directory.modified
    returns_set: true
    language: plpgsql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: partition
      data_type: trend_directory.partition
    description: 'Populate trend_directory.modified table with modified records from
      one

      partition. This function should only be used in recovery scenarios where the

      trend_directory.modified table has become corrupt or records are missing for

      some reason.'
    source: |-
      BEGIN
          RETURN QUERY EXECUTE format(
              'SELECT (trend_directory.mark_modified($1, "timestamp", max(modified))).* '
              'FROM trend_directory.%I GROUP BY timestamp',
              partition.trend_store_id, partition.table_name
          );
      END;
