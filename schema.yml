- function:
    name: version_gtlt_version
    schema: system
    return_type: bool
    language: sql
    volatility: immutable
    strict: false
    secdef: false
    arguments:
    - data_type: system.version_tuple
    - data_type: system.version_tuple
    source: |-
      SELECT
          $1.major > $2.major AND
          $1.minor > $2.minor AND
          $1.patch > $2.patch;
- operator:
    name: <>
    code: system.version_gtlt_version
    left:
      schema: system
      name: version_tuple
    right:
