- function:
    name: create_base_table_sql
    schema: trend_directory
    return_type: text[]
    language: sql
    volatility: stable
    strict: true
    secdef: false
    arguments:
    - name: name
      data_type: text
    - data_type: trend_directory.trend[]
    source: |-
      SELECT ARRAY[
          format(
              'CREATE TABLE %I.%I ('
              'entity_id integer NOT NULL, '
              '"timestamp" timestamp with time zone NOT NULL, '
              'created timestamp with time zone NOT NULL, '
              'modified timestamp with time zone NOT NULL '
              '%s'
              ') PARTITION BY RANGE ("timestamp");',
              trend_directory.base_table_schema(),
              name,
              (
                  SELECT string_agg(format(',%I %s', t.name, t.data_type), ' ')
                  FROM unnest($2) t
              )
          ),
          format(
              'ALTER TABLE %I.%I ADD PRIMARY KEY (entity_id, "timestamp");',
              trend_directory.base_table_schema(),
              name
          ),
          format(
              'CREATE INDEX ON %I.%I USING btree (created);',
              trend_directory.base_table_schema(),
              name
          ),
          format(
              'CREATE INDEX ON %I.%I USING btree (modified);',
              trend_directory.base_table_schema(),
              name
          ),
          format(
              'CREATE INDEX ON %I.%I USING btree (timestamp);',
              trend_directory.base_table_schema(),
              name
          ),
          format(
              'GRANT SELECT ON TABLE %I.%I TO minerva;',
              trend_directory.base_table_schema(),
              name
          ),
          format(
              'GRANT INSERT,DELETE,UPDATE ON TABLE %I.%I TO minerva_writer;',
              trend_directory.base_table_schema(),
              name
          )
      ];
