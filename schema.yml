- function:
    name: update_month_15m
    schema: dimension
    return_type: void
    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments: []
    source: "TRUNCATE dimension.month_15m;\n    INSERT INTO dimension.month_15m SELECT\n\
      \        date_trunc('month', timestamp_15m) as timestamp,\n        timestamp_15m\n\
      \    FROM \n        generate_series(\n            date_trunc('month', now()\
      \ - '1 year'::interval),\n            date_trunc('month', now() + '1 year'::interval),\n\
      \            '15 minutes'::interval\n        ) AS timestamps(timestamp_15m);"
