- function:
    name: integer_to_array
    schema: public
    return_type: integer[]
    language: plpgsql
    volatility: stable
    strict: true
    secdef: false
    arguments:
    - name: value
      data_type: integer
    source: |-
      BEGIN
          RETURN ARRAY[value];
      END;
