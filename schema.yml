- cast:
    source:
      schema: pg_catalog
      name: text[]
    target:
      schema: directory
      name: dn_part
    function:
      schema: directory
      name: array_to_dn_part
    implicit: false
- function:
    name: split_raw_part
    schema: directory
    return_type: directory.dn_part
    language: sql
    volatility: immutable
    strict: false
    secdef: false
    arguments:
    - data_type: text
    source: |-
      SELECT directory.array_to_dn_part(string_to_array($1, '='));
- function:
    name: explode_dn
    schema: directory
    return_type: directory.dn_part[]
    language: sql
    volatility: immutable
    strict: false
    secdef: false
    arguments:
    - data_type: text
    source: |-
      SELECT array_agg(directory.split_raw_part(raw_part)) FROM unnest(string_to_array($1, ',')) AS raw_part;
- function:
    name: glue_dn
    schema: directory
    return_type: text
    language: sql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - data_type: directory.dn_part[]
    source: |-
      SELECT
              array_to_string(b.part_arr, ',')
          FROM (
              SELECT array_agg(parts.p) part_arr
              FROM (
                  SELECT directory.dn_part_to_string(part) p FROM unnest($1) part
              ) parts
          ) b;
- function:
    name: parent_dn_parts
    schema: directory
    return_type: directory.dn_part[]
    language: sql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - data_type: directory.dn_part[]
    source: |-
      SELECT
              CASE
                  WHEN array_length($1, 1) > 1 THEN
                      $1[1:array_length($1, 1) - 1]
                  ELSE
                      NULL
              END;
- function:
    name: parent_dn
    schema: directory
    return_type: text
    language: sql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - data_type: text
    source: |-
      SELECT directory.glue_dn(directory.parent_dn_parts(directory.explode_dn($1)));
