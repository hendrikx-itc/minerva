- function:
    name: create_entity
    schema: directory
    return_type: directory.entity
    language: sql
    volatility: volatile
    strict: true
    secdef: false
    arguments:
    - name: name
      data_type: text
    - name: entity_type
      data_type: directory.entity_type
    source: |-
      INSERT INTO directory.entity(created, name, entity_type_id)
              VALUES (
                  now(),
                  $1,
                  $2.id
              )
              RETURNING entity;
- function:
    name: create_entity_from_dn
    schema: directory
    return_type: directory.entity
    language: plpgsql
    volatility: volatile
    strict: true
    secdef: false
    arguments:
    - data_type: text
    source: |-
        DECLARE entity directory.entity;
        BEGIN
            SELECT * FROM directory.create_entity(
                (directory.last_dn_part(directory.explode_dn($1))).name,
                directory.name_to_entity_type((directory.last_dn_part(directory.explode_dn($1))).type_name)
            ) INTO entity;
            PERFORM alias_directory.create_alias(entity, 'dn', $1);
            RETURN entity;
        END;
- function:
    name: get_or_create_entity
    schema: alias_directory
    return_type: directory.entity
    language: sql
    volatility: volatile
    strict: false
    secdef: false
    arguments:
    - name: alias_type
      data_type: name
    - name: name
      data_type: name
    - name: entity_type
      data_type: name
    source: |-
        SELECT COALESCE(
            alias_directory.get_entity_by_alias($1, $2),
            alias_directory.create_alias(directory.create_entity($2, directory.get_entity_type($3)), $1, $2)
        );
- function:
    name: dn_to_entity
    schema: directory
    return_type: directory.entity
    language: sql
    volatility: volatile
    strict: true
