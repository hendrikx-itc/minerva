- function:
    name: changes_view_query
    schema: attribute_directory
    return_type: text
    language: sql
    volatility: stable
    strict: false
    secdef: false
    arguments:
    - data_type: attribute_directory.attribute_store
    source: |-
      SELECT format('SELECT entity_id, timestamp, COALESCE(hash <> lag(hash) OVER w, true) AS change FROM attribute_history.%I WINDOW w AS (PARTITION BY entity_id ORDER BY timestamp asc)', attribute_directory.to_table_name($1));
- function:
    name: create_changes_view_sql
