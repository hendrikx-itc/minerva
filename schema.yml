- function:
    name: data_type_order
    schema: trend_directory
    return_type: integer
    language: plpgsql
    volatility: immutable
    strict: true
    secdef: false
    arguments:
    - name: data_type
      data_type: text
    source: |-
      BEGIN
          CASE data_type
              WHEN 'smallint' THEN
                  RETURN 1;
              WHEN 'integer' THEN
                  RETURN 2;
              WHEN 'bigint' THEN
                  RETURN 3;
              WHEN 'real' THEN
                  RETURN 4;
              WHEN 'double precision' THEN
                  RETURN 5;
              WHEN 'numeric' THEN
                  RETURN 6;
              WHEN 'timestamp without time zone' THEN
                  RETURN 7;
              WHEN 'smallint[]' THEN
                  RETURN 8;
              WHEN 'integer[]' THEN
                  RETURN 9;
              WHEN 'text[]' THEN
                  RETURN 10;
              WHEN 'text' THEN
                  RETURN 11;
              WHEN NULL THEN
                  RETURN NULL;
              ELSE
                  RAISE EXCEPTION 'Unsupported data type: %', data_type;
          END CASE;
      END;
